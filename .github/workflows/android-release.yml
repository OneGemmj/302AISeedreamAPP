name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-37.0" "build-tools;37.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          VERSION_CODE="$(echo "$VERSION_NAME" | awk -F. '{ printf("%d%03d%03d\n", $1, $2, $3) }')"
          echo "APP_VERSION_NAME=$VERSION_NAME" >> gradle.properties
          echo "APP_VERSION_CODE=$VERSION_CODE" >> gradle.properties

      - name: Test
        run: ./gradlew test --no-daemon --console=plain

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon --console=plain

      - name: Prepare artifact
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME:-manual}"
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk "release/Seedream-302-${VERSION}-debug.apk"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: seedream-302-apk
          path: release/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.apk
